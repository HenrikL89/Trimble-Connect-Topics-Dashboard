<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trimble Connect Topics Dashboard</title>

    <!-- Chart.js for visualizations -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- Trimble Connect Workspace API - CORRECT LIBRARY URL -->
    <script src="https://components.connect.trimble.com/trimble-connect-workspace-api/index.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: #f5f7fa;
            color: #333;
            min-height: 100vh;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Header */
        .header {
            background: linear-gradient(135deg, #005F9E 0%, #0077C8 100%);
            color: white;
            padding: 20px 24px;
            border-radius: 12px;
            margin-bottom: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 12px rgba(0, 95, 158, 0.3);
        }

        .header h1 {
            font-size: 24px;
            font-weight: 600;
        }

        .header .project-name {
            font-size: 14px;
            opacity: 0.9;
            margin-top: 4px;
        }

        .refresh-btn {
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }

        .refresh-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        /* Filters */
        .filters {
            background: white;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 24px;
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
        }

        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .filter-group label {
            font-size: 12px;
            font-weight: 600;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .filter-group select {
            padding: 10px 16px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            min-width: 180px;
            background: white;
            cursor: pointer;
            transition: border-color 0.2s;
        }

        .filter-group select:focus {
            outline: none;
            border-color: #0077C8;
        }

        .reset-btn {
            background: #f5f7fa;
            border: 1px solid #e0e0e0;
            color: #666;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            align-self: flex-end;
            transition: all 0.2s;
        }

        .reset-btn:hover {
            background: #e8ecf0;
        }

        /* Stats Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 24px;
        }

        .stat-card {
            background: white;
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .stat-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.12);
        }

        .stat-card .label {
            font-size: 13px;
            color: #666;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .stat-card .value {
            font-size: 36px;
            font-weight: 700;
            color: #005F9E;
        }

        .stat-card.critical .value {
            color: #dc3545;
        }

        .stat-card.open .value {
            color: #28a745;
        }

        /* Charts */
        .charts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 24px;
            margin-bottom: 24px;
        }

        .chart-card {
            background: white;
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
        }

        .chart-card h3 {
            font-size: 16px;
            font-weight: 600;
            color: #333;
            margin-bottom: 20px;
        }

        .chart-container {
            position: relative;
            height: 280px;
        }

        /* Topics Table */
        .table-card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
            overflow: hidden;
        }

        .table-card h3 {
            font-size: 16px;
            font-weight: 600;
            color: #333;
            padding: 20px 24px;
            border-bottom: 1px solid #e8ecf0;
        }

        .topics-table {
            width: 100%;
            border-collapse: collapse;
        }

        .topics-table th {
            background: #f8fafc;
            padding: 14px 20px;
            text-align: left;
            font-size: 12px;
            font-weight: 600;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 1px solid #e8ecf0;
        }

        .topics-table td {
            padding: 16px 20px;
            border-bottom: 1px solid #f0f2f5;
            font-size: 14px;
        }

        .topics-table tr:hover {
            background: #f8fafc;
        }

        .topics-table .topic-id {
            font-weight: 600;
            color: #005F9E;
        }

        .topics-table .topic-title {
            max-width: 300px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
        }

        .tag-badge {
            display: inline-block;
            padding: 2px 8px;
            background: #e8ecf0;
            border-radius: 4px;
            font-size: 11px;
            color: #555;
            margin-right: 4px;
            margin-bottom: 2px;
        }

        /* Loader */
        #loader {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 400px;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #e8ecf0;
            border-top-color: #005F9E;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        #loader h3 {
            margin-top: 20px;
            color: #666;
        }

        #main-content {
            display: none;
        }

        /* Error State */
        .error-message {
            background: #fff5f5;
            border: 1px solid #ffcccc;
            color: #cc0000;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            margin: 40px auto;
            max-width: 500px;
        }

        .error-message h3 {
            margin-bottom: 10px;
        }

        /* Connection Status */
        .connection-status {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: #666;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #ccc;
        }

        .status-dot.connected {
            background: #28a745;
        }

        .status-dot.connecting {
            background: #ffc107;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        @media (max-width: 768px) {
            .filters {
                flex-direction: column;
            }

            .filter-group select {
                min-width: 100%;
            }

            .charts-grid {
                grid-template-columns: 1fr;
            }

            .topics-table {
                display: block;
                overflow-x: auto;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <div>
                <h1>Topics Dashboard</h1>
                <div class="project-name" id="project-title">Loading project...</div>
            </div>
            <div style="display: flex; align-items: center; gap: 16px;">
                <div class="connection-status">
                    <div class="status-dot" id="status-dot"></div>
                    <span id="status-text">Connecting...</span>
                </div>
                <button class="refresh-btn" onclick="refreshData()">Refresh Data</button>
            </div>
        </div>

        <!-- Loader -->
        <div id="loader">
            <div class="spinner"></div>
            <h3>Connecting to Trimble Connect...</h3>
        </div>

        <!-- Main Content -->
        <div id="main-content">
            <!-- Filters -->
            <div class="filters">
                <div class="filter-group">
                    <label>Assignee</label>
                    <select id="assigneeFilter" onchange="applyFilters()">
                        <option value="All">All Assignees</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label>Status</label>
                    <select id="statusFilter" onchange="applyFilters()">
                        <option value="All">All Statuses</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label>Priority</label>
                    <select id="priorityFilter" onchange="applyFilters()">
                        <option value="All">All Priorities</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label>Tag</label>
                    <select id="tagFilter" onchange="applyFilters()">
                        <option value="All">All Tags</option>
                    </select>
                </div>
                <button class="reset-btn" onclick="resetFilters()">Reset Filters</button>
            </div>

            <!-- Stats -->
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="label">Total Topics</div>
                    <div class="value" id="totalCount">0</div>
                </div>
                <div class="stat-card open">
                    <div class="label">Open</div>
                    <div class="value" id="openCount">0</div>
                </div>
                <div class="stat-card critical">
                    <div class="label">Critical Priority</div>
                    <div class="value" id="criticalCount">0</div>
                </div>
                <div class="stat-card">
                    <div class="label">With Assignee</div>
                    <div class="value" id="assignedCount">0</div>
                </div>
            </div>

            <!-- Charts -->
            <div class="charts-grid">
                <div class="chart-card">
                    <h3>Status Distribution</h3>
                    <div class="chart-container">
                        <canvas id="statusChart"></canvas>
                    </div>
                </div>
                <div class="chart-card">
                    <h3>Priority Distribution</h3>
                    <div class="chart-container">
                        <canvas id="priorityChart"></canvas>
                    </div>
                </div>
                <div class="chart-card">
                    <h3>Topics by Assignee</h3>
                    <div class="chart-container">
                        <canvas id="assigneeChart"></canvas>
                    </div>
                </div>
                <div class="chart-card">
                    <h3>Topics by Type</h3>
                    <div class="chart-container">
                        <canvas id="typeChart"></canvas>
                    </div>
                </div>
            </div>

            <!-- Topics Table -->
            <div class="table-card">
                <h3>All Topics</h3>
                <table class="topics-table">
                    <thead>
                        <tr>
                            <th>Topic</th>
                            <th>Assignee</th>
                            <th>Status</th>
                            <th>Priority</th>
                            <th>Type</th>
                            <th>Tags</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // Global variables
        let rawData = [];
        let statusChart, priorityChart, assigneeChart, typeChart;
        let allAssignees = [], allStatuses = [], allPriorities = [], allTags = [], allTypes = [];
        let api = null;
        let accessToken = null;
        let currentProjectId = null;
        let apiReady = false;

        // Color palette
        const colorPalette = {
            'Open': '#28a745',
            'Closed': '#6c757d',
            'In Progress': '#007bff',
            'Resolved': '#17a2b8',
            'New': '#6610f2',
            'Active': '#007bff',
            'High': '#dc3545',
            'Medium': '#ffc107',
            'Low': '#28a745',
            'Normal': '#17a2b8',
            'Critical': '#dc3545',
            'Urgent': '#fd7e14',
            'Unassigned': '#6c757d'
        };

        // Get color for status/priority
        function getColor(key) {
            return colorPalette[key] || '#005F9E';
        }

        // Wait for WorkspaceAPI to be ready
        function waitForWorkspaceAPI(maxAttempts = 50) {
            return new Promise((resolve, reject) => {
                let attempts = 0;
                const check = () => {
                    attempts++;
                    if (typeof WorkspaceAPI !== 'undefined') {
                        resolve();
                    } else if (attempts >= maxAttempts) {
                        reject(new Error('WorkspaceAPI not available after waiting'));
                    } else {
                        setTimeout(check, 100);
                    }
                };
                check();
            });
        }

        /**
         * TRIMBLE CONNECT INTEGRATION - FIXED VERSION
         */
        async function initExtension() {
            updateConnectionStatus('connecting', 'Connecting...');

            try {
                // 0API to be fully. Wait for Workspace loaded
                console.log('Waiting for WorkspaceAPI to load...');
                await waitForWorkspaceAPI();
                console.log('WorkspaceAPI is now available');

                // 1. Connect to Trimble Connect
                api = await WorkspaceAPI.connect(
                    window.parent,
                    (event, args) => {
                        console.log('Workspace API Event:', event, args);
                        handleApiEvent(event, args);
                    },
                    30000 // 30 second timeout
                );

                console.log('Workspace API connected successfully');
                updateConnectionStatus('connecting', 'Authenticating...');
                apiReady = true;

                // 2. Request access token permission
                try {
                    const tokenResult = await api.extension.requestPermission('accesstoken');
                    console.log('Token permission result:', tokenResult);

                    // Wait for token in event handler
                    await new Promise(resolve => setTimeout(resolve, 500));

                    if (!accessToken && tokenResult && typeof tokenResult === 'string') {
                        accessToken = tokenResult;
                    }
                } catch (permError) {
                    console.log('Permission request result:', permError);
                }

                // 3. Get current project
                updateConnectionStatus('connecting', 'Loading project...');
                const project = await api.project.getCurrentProject();
                currentProjectId = project.id;

                document.getElementById('project-title').innerText = project.name || 'Trimble Connect Project';
                console.log('Project loaded:', currentProjectId);
                updateConnectionStatus('connected', 'Connected');

                // 4. Fetch topics - use embed API approach or fallback
                await fetchTrimbleTopics(currentProjectId);

            } catch (error) {
                console.error('Initialization failed:', error);
                updateConnectionStatus('error', 'Connection failed: ' + error.message);

                // Show error with more details
                document.getElementById('loader').innerHTML = `
                    <div class="error-message">
                        <h3>Connection Error</h3>
                        <p>${error.message || 'Could not connect to Trimble Connect.'}</p>
                        <p style="margin-top: 12px; font-size: 12px; color: #999;">
                            This dashboard must be run as a Trimble Connect Extension.
                        </p>
                        <button class="refresh-btn" onclick="location.reload()" style="margin-top: 16px; background: #005F9E;">
                            Try Again
                        </button>
                    </div>
                `;
            }
        }

        // Handle API events
        function handleApiEvent(event, args) {
            console.log('API Event received:', event, args);

            if (event === 'extension.accessToken') {
                accessToken = args?.data || args;
                console.log('Access token received via event');
            }
        }

        // Update connection status UI
        function updateConnectionStatus(status, text) {
            const dot = document.getElementById('status-dot');
            const textEl = document.getElementById('status-text');

            if (dot && textEl) {
                dot.className = 'status-dot ' + status;
                textEl.innerText = text;
            }
        }

        /**
         * Fetch topics - Try embed API first, then direct API
         */
        async function fetchTrimbleTopics(projectId) {
            // First try using the embed API approach
            try {
                await fetchTopicsViaEmbed(projectId);
                return;
            } catch (e) {
                console.log('Embed approach failed, trying direct API:', e.message);
            }

            // Fallback to direct API with proper error handling
            try {
                await fetchTopicsDirect(projectId);
            } catch (error) {
                console.error('All fetch methods failed:', error);
                document.querySelector('#loader h3').innerText = 'Failed to load topics. Check console for details.';
            }
        }

        /**
         * Try to fetch topics using embed API
         */
        async function fetchTopicsViaEmbed(projectId) {
            console.log('Trying embed API approach...');

            // Use the embed API to make authenticated requests
            if (api && api.embed) {
                try {
                    // Initialize embed with project context
                    await api.embed.initFileExplorer({
                        projectId: projectId
                    });
                } catch (e) {
                    console.log('Embed init failed:', e);
                }
            }

            // Since direct API calls are blocked by CORS in extensions,
            // we need to try a different approach - use the Workspace API if available
            // or show a clear message about the limitation

            // Try one more direct approach with different headers
            if (accessToken) {
                try {
                    const response = await fetch(
                        `https://bcf.connect.trimble.com/bcf/3.0/projects/${projectId}/topics`,
                        {
                            method: 'GET',
                            headers: {
                                'Authorization': `Bearer ${accessToken}`,
                                'Accept': 'application/json',
                                'Content-Type': 'application/json'
                            },
                            mode: 'cors'
                        }
                    );

                    if (response.ok) {
                        const bcfData = await response.json();
                        processTopicsData(bcfData);
                        return;
                    }
                } catch (e) {
                    console.log('Direct BCF call failed:', e.message);
                }
            }

            throw new Error('Embed approach did not work');
        }

        /**
         * Fetch topics directly - will likely fail due to CORS
         */
        async function fetchTopicsDirect(projectId) {
            console.log('Trying direct API approach (likely to fail due to CORS)...');

            const endpoints = [
                `https://bcf.connect.trimble.com/bcf/3.0/projects/${projectId}/topics`,
                `https://app.connect.trimble.com/tc/api/2.0/projects/${projectId}/topics`
            ];

            let lastError = null;

            for (const endpoint of endpoints) {
                try {
                    const response = await fetch(endpoint, {
                        method: 'GET',
                        headers: {
                            'Authorization': `Bearer ${accessToken}`,
                            'Accept': 'application/json'
                        }
                    });

                    if (response.ok) {
                        const data = await response.json();
                        const topics = Array.isArray(data) ? data : (data.items || data.topics || []);
                        processTopicsData(topics);
                        return;
                    } else {
                        lastError = `HTTP ${response.status}`;
                        console.log(`Endpoint ${endpoint} returned ${response.status}`);
                    }
                } catch (e) {
                    lastError = e.message;
                    console.log(`Endpoint ${endpoint} failed:`, e.message);
                }
            }

            // If we get here, all direct API calls failed due to CORS
            // This is expected behavior for Trimble Connect extensions
            console.warn('All direct API calls failed due to CORS policy');
            showCORSWorkaround();
        }

        /**
         * Show CORS workaround message
         */
        function showCORSWorkaround() {
            document.getElementById('loader').innerHTML = `
                <div class="error-message" style="border-color: #ffc107; background: #fffbf0; color: #856404;">
                    <h3>CORS Policy Restriction</h3>
                    <p>Direct API calls are blocked by Trimble Connect's CORS policy when running as an extension.</p>
                    <p style="margin-top: 12px; font-size: 13px;">
                        <strong>Solution Options:</strong>
                    </p>
                    <ul style="text-align: left; margin: 12px 0; font-size: 12px;">
                        <li>Use a backend proxy server to make API calls</li>
                        <li>Use the Trimble Connect desktop application instead</li>
                        <li>Contact Trimble for extension API access</li>
                    </ul>
                    <button class="refresh-btn" onclick="loadMockData()" style="margin-top: 16px; background: #28a745;">
                        Load Demo Data
                    </button>
                </div>
            `;
        }

        /**
         * Process topics data
         */
        function processTopicsData(topics) {
            if (!topics || topics.length === 0) {
                document.getElementById('loader').innerHTML = `
                    <div class="error-message">
                        <h3>No Topics Found</h3>
                        <p>This project has no BCF topics yet, or the API returned empty results.</p>
                    </div>
                `;
                return;
            }

            rawData = topics.map(topic => ({
                id: topic.index || (topic.guid ? topic.guid.substring(0, 8) : 'N/A'),
                guid: topic.guid,
                title: topic.title || 'Untitled',
                status: topic.topic_status || 'Open',
                priority: topic.priority || 'Normal',
                type: topic.topic_type || 'Issue',
                assignee: topic.assigned_to || 'Unassigned',
                tags: topic.labels || [],
                creationDate: topic.creation_date,
                modifiedDate: topic.modification_date
            }));

            console.log('Processed topics:', rawData.length);
            processData();
            document.getElementById('loader').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';
        }

        /**
         * Refresh data
         */
        async function refreshData() {
            if (!currentProjectId) {
                console.log('Not connected, reinitializing...');
                await initExtension();
                return;
            }

            document.getElementById('loader').style.display = 'flex';
            document.getElementById('main-content').style.display = 'none';

            try {
                await fetchTrimbleTopics(currentProjectId);
            } catch (error) {
                console.error('Refresh failed:', error);
                document.getElementById('loader').style.display = 'none';
                document.getElementById('main-content').style.display = 'block';
            }
        }

        /**
         * DATA PROCESSING & FILTERS
         */
        function processData() {
            // Extract unique values
            allAssignees = [...new Set(rawData.map(i => i.assignee))].sort();
            allStatuses = [...new Set(rawData.map(i => i.status))].sort();
            allPriorities = [...new Set(rawData.map(i => i.priority))].sort();
            allTypes = [...new Set(rawData.map(i => i.type))].sort();

            let tagSet = new Set();
            rawData.forEach(i => i.tags.forEach(t => tagSet.add(t)));
            allTags = [...tagSet].sort();

            // Populate dropdowns
            populateDropdown('assigneeFilter', allAssignees);
            populateDropdown('statusFilter', allStatuses);
            populateDropdown('priorityFilter', allPriorities);
            populateDropdown('tagFilter', allTags);

            // Apply initial filters
            applyFilters();
        }

        function populateDropdown(id, items) {
            const select = document.getElementById(id);
            const currentVal = select.value;
            select.innerHTML = `<option value="All">All ${id.replace('Filter', '')}s</option>`;
            items.forEach(item => {
                const opt = document.createElement('option');
                opt.value = item;
                opt.innerText = item;
                select.appendChild(opt);
            });
            select.value = currentVal;
        }

        function applyFilters() {
            const fAssignee = document.getElementById('assigneeFilter').value;
            const fStatus = document.getElementById('statusFilter').value;
            const fPriority = document.getElementById('priorityFilter').value;
            const fTag = document.getElementById('tagFilter').value;

            const filtered = rawData.filter(i => {
                return (fAssignee === 'All' || i.assignee === fAssignee) &&
                       (fStatus === 'All' || i.status === fStatus) &&
                       (fPriority === 'All' || i.priority === fPriority) &&
                       (fTag === 'All' || i.tags.includes(fTag));
            });

            updateDashboard(filtered);
        }

        function resetFilters() {
            document.querySelectorAll('.filter-group select').forEach(s => s.value = 'All');
            applyFilters();
        }

        function updateDashboard(data) {
            // Update stats
            document.getElementById('totalCount').innerText = data.length;
            document.getElementById('openCount').innerText = data.filter(i => i.status === 'Open' || i.status === 'New' || i.status === 'In Progress').length;
            document.getElementById('criticalCount').innerText = data.filter(i => i.priority === 'Critical' || i.priority === 'Urgent' || i.priority === 'High').length;
            document.getElementById('assignedCount').innerText = data.filter(i => i.assignee && i.assignee !== 'Unassigned').length;

            // Render components
            renderTable(data);
            renderCharts(data);
        }

        function renderTable(data) {
            const tbody = document.getElementById('tableBody');

            if (data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" style="text-align: center; padding: 40px; color: #999;">No topics found</td></tr>';
                return;
            }

            tbody.innerHTML = data.slice(0, 100).map(i => `
                <tr>
                    <td>
                        <span class="topic-id">#${i.id}</span><br>
                        <span class="topic-title" title="${i.title}">${i.title}</span>
                    </td>
                    <td>${i.assignee}</td>
                    <td><span class="badge" style="background: ${getColor(i.status)}">${i.status}</span></td>
                    <td><span class="badge" style="background: ${getColor(i.priority)}">${i.priority}</span></td>
                    <td>${i.type}</td>
                    <td>${i.tags.map(t => `<span class="tag-badge">${t}</span>`).join('')}</td>
                </tr>
            `).join('');
        }

        function renderCharts(data) {
            const statusCounts = {};
            const priorityCounts = {};
            const assigneeCounts = {};
            const typeCounts = {};

            data.forEach(i => {
                statusCounts[i.status] = (statusCounts[i.status] || 0) + 1;
                priorityCounts[i.priority] = (priorityCounts[i.priority] || 0) + 1;
                assigneeCounts[i.assignee] = (assigneeCounts[i.assignee] || 0) + 1;
                typeCounts[i.type] = (typeCounts[i.type] || 0) + 1;
            });

            // Destroy existing charts
            if (statusChart) statusChart.destroy();
            if (priorityChart) priorityChart.destroy();
            if (assigneeChart) assigneeChart.destroy();
            if (typeChart) typeChart.destroy();

            // Status Chart
            statusChart = new Chart(document.getElementById('statusChart'), {
                type: 'doughnut',
                data: {
                    labels: Object.keys(statusCounts),
                    datasets: [{
                        data: Object.values(statusCounts),
                        backgroundColor: Object.keys(statusCounts).map(getColor)
                    }]
                },
                options: {
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            position: 'right'
                        }
                    }
                }
            });

            // Priority Chart
            priorityChart = new Chart(document.getElementById('priorityChart'), {
                type: 'pie',
                data: {
                    labels: Object.keys(priorityCounts),
                    datasets: [{
                        data: Object.values(priorityCounts),
                        backgroundColor: Object.keys(priorityCounts).map(getColor)
                    }]
                },
                options: {
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            position: 'right'
                        }
                    }
                }
            });

            // Assignee Chart
            const assigneeLabels = Object.keys(assigneeCounts).slice(0, 10);
            const assigneeData = assigneeLabels.map(k => assigneeCounts[k]);

            assigneeChart = new Chart(document.getElementById('assigneeChart'), {
                type: 'bar',
                data: {
                    labels: assigneeLabels,
                    datasets: [{
                        label: 'Topics',
                        data: assigneeData,
                        backgroundColor: '#005F9E'
                    }]
                },
                options: {
                    maintainAspectRatio: false,
                    indexAxis: 'y',
                    plugins: {
                        legend: {
                            display: false
                        }
                    }
                }
            });

            // Type Chart
            typeChart = new Chart(document.getElementById('typeChart'), {
                type: 'bar',
                data: {
                    labels: Object.keys(typeCounts),
                    datasets: [{
                        label: 'Topics',
                        data: Object.values(typeCounts),
                        backgroundColor: Object.keys(typeCounts).map((_, i) =>
                            ['#005F9E', '#28a745', '#dc3545', '#ffc107', '#17a2b8'][i % 5]
                        )
                    }]
                },
                options: {
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            display: false
                        }
                    }
                }
            });
        }
