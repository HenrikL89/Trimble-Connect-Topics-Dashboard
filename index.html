<!-- Add the Workspace API Library before your script -->
<script src="https://components.connect.trimble.com"></script>

<script>
    let rawData = [];
    let statusChart, priorityChart, assigneeChart;
    let allAssignees = [], allStatuses = [], allPriorities = [], allTags = [];

    // ... Keep your existing colorPalette and getColor functions here ...

    /**
     * TRIMBLE CONNECT INTEGRATION
     */
    async function initExtension() {
        try {
            // 1. Connect to Trimble Connect
            const api = await TrimbleConnectWorkspace.connect(
                window.parent,
                (event, args) => {
                    if (event === "extension.accessToken") {
                        window.accessToken = args.data;
                    }
                },
                30000
            );

            // 2. Get Project and Token
            const projectInfo = await api.project.getCurrentProject();
            const tokenObj = await api.auth.getAccessToken();
            
            const projectId = projectInfo.id;
            const token = tokenObj.accessToken;

            document.getElementById('project-title').innerText = projectInfo.name;

            // 3. Fetch Data from BCF API
            await fetchTrimbleTopics(projectId, token);

        } catch (error) {
            console.error("Initialization failed", error);
            // Fallback for local testing
            alert("Could not connect to Trimble. Ensure this is running as a Trimble Extension.");
        }
    }

    async function fetchTrimbleTopics(projectId, token) {
        try {
            const response = await fetch(`https://bcf.connect.trimble.com/bcf/3.0/projects/${projectId}/topics`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            
            if (!response.ok) throw new Error("API request failed");
            
            const bcfData = await response.json();

            // 4. Map BCF 3.0 format to your dashboard data structure
            rawData = bcfData.map(topic => ({
                id: topic.index || topic.guid.substring(0, 5),
                title: topic.title,
                status: topic.topic_status || "Open",
                priority: topic.priority || "Normal",
                assignee: topic.assigned_to || "Unassigned",
                tags: topic.labels || []
            }));

            processData();
            document.getElementById('loader').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';

        } catch (error) {
            console.error("Fetch Error:", error);
            document.querySelector('#loader h3').innerText = "Failed to load topics.";
        }
    }

    // Call init on load
    window.onload = initExtension;

    /**
     * DATA PROCESSING & FILTERS
     */
    function processData() {
        // Clear previous sets
        allAssignees = [...new Set(rawData.map(i => i.assignee))].sort();
        allStatuses = [...new Set(rawData.map(i => i.status))].sort();
        allPriorities = [...new Set(rawData.map(i => i.priority))].sort();
        
        let tagSet = new Set();
        rawData.forEach(i => i.tags.forEach(t => tagSet.add(t)));
        allTags = [...tagSet].sort();

        populateDropdown('assigneeFilter', allAssignees);
        populateDropdown('statusFilter', allStatuses);
        populateDropdown('priorityFilter', allPriorities);
        populateDropdown('tagFilter', allTags);

        applyFilters();
    }

    function populateDropdown(id, items) {
        const select = document.getElementById(id);
        const currentVal = select.value;
        select.innerHTML = `<option value="All">All ${id.replace('Filter', '')}s</option>`;
        items.forEach(item => {
            const opt = document.createElement('option');
            opt.value = item;
            opt.innerText = item;
            select.appendChild(opt);
        });
        select.value = currentVal;
    }

    function applyFilters() {
        const fAssignee = document.getElementById('assigneeFilter').value;
        const fStatus = document.getElementById('statusFilter').value;
        const fPriority = document.getElementById('priorityFilter').value;
        const fTag = document.getElementById('tagFilter').value;

        const filtered = rawData.filter(i => {
            return (fAssignee === 'All' || i.assignee === fAssignee) &&
                   (fStatus === 'All' || i.status === fStatus ) &&
                   (fPriority === 'All' || i.priority === fPriority) &&
                   (fTag === 'All' || i.tags.includes(fTag));
        });

        updateDashboard(filtered);
    }

    function resetFilters() {
        document.querySelectorAll('.filter-group select').forEach(s => s.value = 'All');
        applyFilters();
    }

    function updateDashboard(data) {
        document.getElementById('issueCount').innerText = data.length;
        renderTable(data);
        renderCharts(data);
    }

    function renderTable(data) {
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = data.map(i => `
            <tr>
                <td><strong>#${i.id}</strong><br>${i.title}</td>
                <td>${i.assignee}</td>
                <td><span class="badge" style="background:${getColor(i.status)}">${i.status}</span></td>
                <td><span class="badge" style="background:${getColor(i.priority)}">${i.priority}</span></td>
                <td>${i.tags.map(t => `<span class="tag-badge">${t}</span>`).join('')}</td>
            </tr>
        `).join('');
    }

    function renderCharts(data) {
        const statusCounts = {};
        const priorityCounts = {};
        const assigneeCounts = {};

        data.forEach(i => {
            statusCounts[i.status] = (statusCounts[i.status] || 0) + 1;
            priorityCounts[i.priority] = (priorityCounts[i.priority] || 0) + 1;
            assigneeCounts[i.assignee] = (assigneeCounts[i.assignee] || 0) + 1;
        });

        if (statusChart) statusChart.destroy();
        if (priorityChart) priorityChart.destroy();
        if (assigneeChart) assigneeChart.destroy();

        statusChart = new Chart(document.getElementById('statusChart'), {
            type: 'doughnut',
            data: {
                labels: Object.keys(statusCounts),
                datasets: [{ data: Object.values(statusCounts), backgroundColor: Object.keys(statusCounts).map(getColor) }]
            },
            options: { maintainAspectRatio: false }
        });

        priorityChart = new Chart(document.getElementById('priorityChart'), {
            type: 'pie',
            data: {
                labels: Object.keys(priorityCounts),
                datasets: [{ data: Object.values(priorityCounts), backgroundColor: Object.keys(priorityCounts).map(getColor) }]
            },
            options: { maintainAspectRatio: false }
        });

        assigneeChart = new Chart(document.getElementById('assigneeChart'), {
            type: 'bar',
            data: {
                labels: Object.keys(assigneeCounts),
                datasets: [{ label: 'Topics', data: Object.values(assigneeCounts), backgroundColor: '#3b82f6' }]
            },
            options: { maintainAspectRatio: false, indexAxis: 'y' }
        });
    }
</script>
