<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trimble Connect Interactive Topics Dashboard</title>
    
    <!-- Trimble Connect Workspace API -->
    <script src="https://components.connect.trimble.com/trimble-connect-workspace-api/index.js"></script>
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        body { font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background-color: #f9fafb; margin: 0; padding: 20px; color: #1f2937; }
        .container { max-width: 1200px; margin: 0 auto; }
        
        .header { text-align: center; margin-bottom: 20px; display: flex; flex-direction: column; align-items: center; }
        .header h1 { margin: 0; font-size: 28px; color: #111827; }
        .header p { color: #6b7280; margin-top: 5px; }
        
        /* Loader styles */
        #loader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.95); z-index: 9999;
            display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center;
        }
        .spinner { border: 4px solid #f3f4f6; border-top: 4px solid #3b82f6; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin-bottom: 15px; }
        .spinner-small { border: 2px solid #cbd5e1; border-top: 2px solid #3b82f6; border-radius: 50%; width: 12px; height: 12px; animation: spin 1s linear infinite; display: inline-block; vertical-align: middle; margin-right: 6px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #error-log { color: #ef4444; font-size: 14px; margin-top: 10px; max-width: 600px; word-wrap: break-word; }

        .filter-panel { background: #ffffff; border-radius: 10px; padding: 20px; margin-bottom: 20px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); display: flex; flex-wrap: wrap; gap: 15px; align-items: flex-end; }
        .filter-group { display: flex; flex-direction: column; flex: 1; min-width: 160px; }
        .filter-group label { font-size: 12px; font-weight: 600; color: #4b5563; margin-bottom: 5px; text-transform: uppercase; }
        .filter-group select { padding: 10px 15px; border: 1px solid #d1d5db; border-radius: 6px; font-size: 14px; outline: none; width: 100%; background-color: #f9fafb; cursor: pointer; height: 42px; }
        .reset-btn { background-color: #ef4444; color: white; border: none; border-radius: 6px; padding: 0 20px; height: 42px; font-size: 14px; font-weight: 600; cursor: pointer; white-space: nowrap; }
        .reset-btn:hover { background-color: #dc2626; }
        .button-group { flex: 0 0 auto; }

        .dashboard { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .card { background: #ffffff; border-radius: 10px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); padding: 20px; }
        .card-title { font-size: 16px; font-weight: 600; margin-bottom: 15px; color: #374151; border-bottom: 1px solid #e5e7eb; padding-bottom: 10px; }
        .full-width { grid-column: span 2; }
        .chart-container { position: relative; height: 300px; width: 100%; }

        .table-container { overflow-x: auto; max-height: 400px; }
        table { width: 100%; border-collapse: collapse; text-align: left; }
        th, td { padding: 12px 15px; border-bottom: 1px solid #e5e7eb; font-size: 14px; }
        th { background-color: #f3f4f6; position: sticky; top: 0; z-index: 10; }
        .badge { padding: 4px 8px; border-radius: 999px; font-size: 12px; font-weight: 600; color: white; white-space: nowrap; }
        .tag-badge { display: inline-block; padding: 3px 6px; background-color: #e5e7eb; color: #4b5563; border-radius: 4px; font-size: 11px; margin: 2px; }
        
        /* Deep Link Styling */
        .issue-link { color: #3b82f6; text-decoration: none; font-weight: 600; display: inline-flex; align-items: center; gap: 5px; cursor: pointer; }
        .issue-link:hover { text-decoration: underline; color: #2563eb; }
        .link-icon { font-size: 12px; }

        @media (max-width: 768px) { .dashboard { grid-template-columns: 1fr; } .full-width { grid-column: span 1; } }
    </style>
</head>
<body>

    <!-- Loading Screen -->
    <div id="loader">
        <div class="spinner" id="spinner"></div>
        <h3 style="color: #374151; margin: 0;">Loading Project Dashboard...</h3>
        <p id="loader-text" style="color: #6b7280; font-size: 14px; margin-top: 8px;">Initialiserer Trimble Connect Workspace...</p>
        <p id="error-log"></p>
    </div>

    <div class="container" style="display: none;" id="main-content">
        <div class="header">
            <h1 id="project-title">Interactive Topics Dashboard</h1>
            <p>Live Trimble Connect BCF Data Integration</p>
        </div>

        <!-- Filter Controls -->
        <div class="filter-panel">
            <div class="filter-group"><label>Assignee</label><select id="assigneeFilter" onchange="applyFilters()"><option value="All">All Assignees</option></select></div>
            <div class="filter-group"><label>Status</label><select id="statusFilter" onchange="applyFilters()"><option value="All">All Statuses</option></select></div>
            <div class="filter-group"><label>Priority</label><select id="priorityFilter" onchange="applyFilters()"><option value="All">All Priorities</option></select></div>
            <div class="filter-group"><label>Tags / Fag</label><select id="tagFilter" onchange="applyFilters()"><option value="All">All Tags</option></select></div>
            <div class="filter-group button-group"><button class="reset-btn" onclick="resetFilters()">Reset Filters</button></div>
        </div>

        <div class="dashboard">
            <div class="card"><div class="card-title">Status Distribution</div><div class="chart-container"><canvas id="statusChart"></canvas></div></div>
            <div class="card"><div class="card-title">Priority Levels</div><div class="chart-container"><canvas id="priorityChart"></canvas></div></div>
            <div class="card full-width"><div class="card-title">Workload by Assignee</div><div class="chart-container" style="height: 350px;"><canvas id="assigneeChart"></canvas></div></div>
            <div class="card full-width">
                <div class="card-title">Matching Issues (<span id="issueCount">0</span>)</div>
                <div class="table-container">
                    <table id="issueTable">
                        <thead><tr><th>Topic Title / Link</th><th>Assignee</th><th>Status</th><th>Priority</th><th>Tags</th></tr></thead>
                        <tbody id="tableBody"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        // SMART BCF ENDPOINTS
        const BCF_ENDPOINTS =[
            "https://open21.connect.trimble.com",
            "https://bcf.eu.connect.trimble.com",
            "https://bcf.connect.trimble.com",
            "https://bcf.asia.connect.trimble.com"
        ];

        let API = null, accessToken = null, currentProjectId = null;
        let activeEndpoint = "https://open21.connect.trimble.com"; 
        
        let rawData =[];
        let statusChart = null, priorityChart = null, assigneeChart = null;
        let allAssignees =[], allStatuses = [], allPriorities =[], allTags =[];

        const colorPalette = {
            'New': '#3b82f6', 'Open': '#3b82f6', 'Active': '#3b82f6',
            'In Progress': '#f59e0b', 'Assigned': '#f59e0b',
            'Done': '#10b981', 'Resolved': '#10b981', 'Ready': '#10b981', 'Closed': '#6b7280', 
            'Normal': '#6366f1', 'Low': '#9ca3af', 'High': '#ef4444', 'Critical': '#b91c1c'
        };
        const fallbackColors =['#8b5cf6', '#ec4899', '#14b8a6', '#f97316', '#06b6d4'];
        let colorIndex = 0;

        function getColor(key) {
            if (!key) return '#d1d5db';
            if (colorPalette[key]) return colorPalette[key];
            colorPalette[key] = fallbackColors[colorIndex % fallbackColors.length];
            colorIndex++;
            return colorPalette[key];
        }

        function setLoaderText(text) { document.getElementById('loader-text').innerText = text; }
        function logError(msg) { console.error(msg); document.getElementById('error-log').innerText += msg + "\n"; document.getElementById('spinner').style.display = 'none'; }
        
        function escapeHtml(str) {
            return String(str || "").replace(/[&<>'"]/g, match => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' })[match]);
        }

        function extractTags(topic) {
            const candidates =[];
            if (topic.labels && Array.isArray(topic.labels)) candidates.push(...topic.labels);
            if (topic.tags && Array.isArray(topic.tags)) candidates.push(...topic.tags);
            if (topic.label) candidates.push(topic.label);
            if (topic.tag) candidates.push(topic.tag);
            if (topic.discipline) candidates.push(topic.discipline);
            return[...new Set(candidates.map(s => String(s).trim()).filter(Boolean))];
        }

        // ==========================================
        // 1. TRIMBLE CONNECT WORKSPACE API
        // ==========================================
        async function init() {
            setLoaderText("Kobler til Trimble Connect Workspace...");
            try {
                API = await TrimbleConnectWorkspace.connect(window.parent, (event, args) => {
                    if (event === "extension.accessToken" && args.data) handleAccessTokenPayload(args.data);
                });

                const projectInfo = await API.project.getCurrentProject();
                currentProjectId = projectInfo.id;
                document.getElementById('project-title').innerText = `Live Topics: ${projectInfo.name || 'Project'}`;

                setLoaderText("Ber om tilgang (accessToken)...");
                const permissionResult = await API.extension.requestPermission("accesstoken");
                handleAccessTokenPayload(permissionResult);
            } catch (err) { logError("Feil ved tilkobling til Trimble Workspace: " + (err.message || err)); }
        }

        function handleAccessTokenPayload(payload) {
            if (!payload || payload === "pending" || payload === "denied") return;
            if (typeof payload === "string") accessToken = payload;
            else if (typeof payload === "object" && payload.accessToken) accessToken = payload.accessToken;
            if (accessToken) fetchDataWithSmartFallback();
        }

        // ==========================================
        // 2. SMART FETCH DATA 
        // ==========================================
        async function fetchDataWithSmartFallback() {
            setLoaderText("Henter BCF Topics fra server...");
            let fetchedArray = null;

            for (const base of BCF_ENDPOINTS) {
                try {
                    setLoaderText(`Prøver BCF endpoint: ${base}...`);
                    const url = `${base}/bcf/3.0/projects/${encodeURIComponent(currentProjectId)}/topics`;
                    const resp = await fetch(url, { method: "GET", headers: { "Authorization": `Bearer ${accessToken}`, "Accept": "application/json" } });

                    if (resp.ok) {
                        activeEndpoint = base; // Save the working endpoint so the 3D loader knows where to fetch viewpoints from
                        const json = await resp.json();
                        if (Array.isArray(json)) fetchedArray = json;
                        else if (json && Array.isArray(json.topics)) fetchedArray = json.topics;
                        else if (json && Array.isArray(json.value)) fetchedArray = json.value;
                        else fetchedArray =[]; 
                        break; 
                    }
                } catch (err) { console.warn(`Endpoint feilet: ${base}`, err); }
            }

            if (fetchedArray === null) return logError("Klarte ikke å hente topics fra noen kjente BCF servere.");
            processDataSafely(fetchedArray);
        }

        // ==========================================
        // 3. SAFE DATA PARSING & DASHBOARD INIT
        // ==========================================
        function processDataSafely(bcfArray) {
            setLoaderText("Prosesserer og bygger dashboard...");
            
            rawData = bcfArray.map(topic => {
                let assigneeName = topic.assigned_to || 'Ikke tildelt';
                if (assigneeName.includes('@')) assigneeName = assigneeName.split('@')[0];

                const guid = topic.guid || topic.topic_guid || topic.id || '';
                return {
                    id: topic.title || topic.topic_title || guid || 'Uten tittel',
                    guid: guid,
                    assignee: assigneeName,
                    status: topic.topic_status || topic.status || 'Open',
                    priority: topic.priority || 'Normal',
                    tags: extractTags(topic)
                };
            });

            allAssignees =[...new Set(rawData.map(i => i.assignee))].sort() || [];
            allStatuses =[...new Set(rawData.map(i => i.status))].sort() ||[];
            allPriorities =[...new Set(rawData.map(i => i.priority))].sort() ||[];
            allTags =[...new Set(rawData.flatMap(i => i.tags))].sort() ||[];

            populateSelect('assigneeFilter', allAssignees);
            populateSelect('statusFilter', allStatuses);
            populateSelect('priorityFilter', allPriorities);
            populateSelect('tagFilter', allTags);

            document.getElementById('loader').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';

            initCharts();
            applyFilters();
        }

        function populateSelect(id, items) {
            const select = document.getElementById(id);
            if (!select) return;
            select.innerHTML = select.options[0].outerHTML;
            items.forEach(item => { const opt = document.createElement('option'); opt.value = item; opt.textContent = item; select.appendChild(opt); });
        }

        const handleChartHover = (event, elements) => { event.native.target.style.cursor = elements.length ? 'pointer' : 'default'; };

        function initCharts() {
            if(statusChart) statusChart.destroy();
            if(priorityChart) priorityChart.destroy();
            if(assigneeChart) assigneeChart.destroy();

            const chartOptions = (filterId) => ({
                responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom' } },
                onClick: (event, elements, chart) => {
                    if (elements.length > 0) {
                        const label = chart.data.labels[elements[0].index];
                        const select = document.getElementById(filterId);
                        select.value = select.value === label ? 'All' : label;
                        applyFilters();
                    }
                },
                onHover: handleChartHover
            });

            statusChart = new Chart(document.getElementById('statusChart').getContext('2d'), {
                type: 'doughnut', data: { labels: allStatuses, datasets:[{ data: [], backgroundColor: allStatuses.map(getColor) }] },
                options: chartOptions('statusFilter')
            });

            priorityChart = new Chart(document.getElementById('priorityChart').getContext('2d'), {
                type: 'pie', data: { labels: allPriorities, datasets: [{ data: [], backgroundColor: allPriorities.map(getColor) }] },
                options: chartOptions('priorityFilter')
            });

            const datasets = allStatuses.map(status => ({ label: status, data:[], backgroundColor: getColor(status) }));
            assigneeChart = new Chart(document.getElementById('assigneeChart').getContext('2d'), {
                type: 'bar', data: { labels: allAssignees, datasets: datasets },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    scales: { x: { stacked: true, grid: { display: false } }, y: { stacked: true, beginAtZero: true, ticks: { stepSize: 1 } } },
                    plugins: { tooltip: { mode: 'index', intersect: false } },
                    onClick: (event, elements) => {
                        if (elements.length > 0) {
                            const label = assigneeChart.data.labels[elements[0].index];
                            const select = document.getElementById('assigneeFilter');
                            select.value = select.value === label ? 'All' : label;
                            applyFilters();
                        }
                    },
                    onHover: handleChartHover
                }
            });
        }

        function resetFilters() {['assigneeFilter', 'statusFilter', 'priorityFilter', 'tagFilter'].forEach(id => document.getElementById(id).value = 'All'); applyFilters(); }

        function applyFilters() {
            const filters = { assignee: document.getElementById('assigneeFilter').value, status: document.getElementById('statusFilter').value, priority: document.getElementById('priorityFilter').value, tag: document.getElementById('tagFilter').value };

            Object.keys(filters).forEach(key => {
                const el = document.getElementById(key + 'Filter');
                if (filters[key] !== 'All') { el.style.borderColor = '#3b82f6'; el.style.backgroundColor = '#eff6ff'; el.style.fontWeight = '600'; } 
                else { el.style.borderColor = '#d1d5db'; el.style.backgroundColor = '#f9fafb'; el.style.fontWeight = '400'; }
            });

            const filteredData = rawData.filter(issue => {
                return (filters.assignee === 'All' || issue.assignee === filters.assignee) &&
                       (filters.status === 'All' || issue.status === filters.status) &&
                       (filters.priority === 'All' || issue.priority === filters.priority) &&
                       (filters.tag === 'All' || issue.tags.includes(filters.tag));
            });

            updateCharts(filteredData);
            updateTable(filteredData);
        }

        function updateCharts(data) {
            let statusCounts = {}, priorityCounts = {}, assigneeCounts = {};
            
            allStatuses.forEach(s => statusCounts[s] = 0);
            allPriorities.forEach(p => priorityCounts[p] = 0);
            allAssignees.forEach(a => { assigneeCounts[a] = {}; allStatuses.forEach(s => assigneeCounts[a][s] = 0); });

            data.forEach(issue => {
                if(statusCounts[issue.status] !== undefined) statusCounts[issue.status]++;
                if(priorityCounts[issue.priority] !== undefined) priorityCounts[issue.priority]++;
                if(assigneeCounts[issue.assignee] && assigneeCounts[issue.assignee][issue.status] !== undefined) assigneeCounts[issue.assignee][issue.status]++;
            });

            statusChart.data.datasets[0].data = allStatuses.map(s => statusCounts[s]); statusChart.update();
            priorityChart.data.datasets[0].data = allPriorities.map(p => priorityCounts[p]); priorityChart.update();

            allStatuses.forEach((status, index) => { if(assigneeChart.data.datasets[index]) assigneeChart.data.datasets[index].data = allAssignees.map(a => assigneeCounts[a][status]); });
            assigneeChart.update();
        }

        // ==========================================
        // 4. ADVANCED 3D VIEW & MODEL LOADER
        // ==========================================
        window.openTopicIn3D = async function(event, topicGuid) {
            event.preventDefault();
            const linkEl = event.currentTarget;
            const originalHtml = linkEl.innerHTML;
            
            // Visual feedback so user knows data is being fetched
            linkEl.innerHTML = `<span class="spinner-small"></span> Laster view...`;
            linkEl.style.pointerEvents = "none";

            try {
                let modelIds =[];
                let firstVpId = null;
                let shortViewId = null; // Sometimes Trimble uses internal short-IDs for Views (like Vudl_eKrqx0)
                
                // 1. Fetch viewpoints for the topic
                const vpResp = await fetch(`${activeEndpoint}/bcf/3.0/projects/${encodeURIComponent(currentProjectId)}/topics/${encodeURIComponent(topicGuid)}/viewpoints`, {
                    headers: { "Authorization": `Bearer ${accessToken}`, "Accept": "application/json" }
                });
                
                if (vpResp.ok) {
                    const viewpoints = await vpResp.json();
                    if (viewpoints && viewpoints.length > 0) {
                        
                        // Grab the default viewpoint (or the first one if no default)
                        const vp = viewpoints.find(v => v.default) || viewpoints[0];
                        firstVpId = vp.guid || vp.id;
                        
                        // Pre-check if Trimble saved their short viewId in the extensions
                        if (vp.extensions && vp.extensions.viewId) shortViewId = vp.extensions.viewId;
                        if (vp.extensions && vp.extensions.trimble_view_id) shortViewId = vp.extensions.trimble_view_id;

                        // 2. Fetch specific viewpoint details
                        const detailResp = await fetch(`${activeEndpoint}/bcf/3.0/projects/${encodeURIComponent(currentProjectId)}/topics/${encodeURIComponent(topicGuid)}/viewpoints/${encodeURIComponent(firstVpId)}`, {
                            headers: { "Authorization": `Bearer ${accessToken}`, "Accept": "application/json" }
                        });
                        
                        if (detailResp.ok) {
                            const vpDetail = await detailResp.json();
                            
                            // Check details for the short view ID just in case it's here
                            if (!shortViewId) {
                                if (vpDetail.extensions && vpDetail.extensions.viewId) shortViewId = vpDetail.extensions.viewId;
                                if (vpDetail.extensions && vpDetail.extensions.trimble_view_id) shortViewId = vpDetail.extensions.trimble_view_id;
                                if (vpDetail.viewId) shortViewId = vpDetail.viewId;
                            }
                            
                            // 3. Extract model IDs to force them to load
                            const modelsArray = (vpDetail.viewpoint && vpDetail.viewpoint.models) ? vpDetail.viewpoint.models : 
                                                (vpDetail.models ? vpDetail.models :[]);
                                                
                            modelsArray.forEach(m => {
                                const mid = m.model_id || m.modelId || m.id;
                                if (mid) modelIds.push(mid);
                            });
                        }
                    }
                }

                // 4. Construct Final Deep Link
                const uniqueModels = [...new Set(modelIds)];
                let finalUrl = `https://web.connect.trimble.com/projects/${currentProjectId}/viewer/3d?topicId=${topicGuid}`;
                
                // If a short viewId (e.g., Vudl_eKrqx0) was found, prioritize it.
                if (shortViewId) {
                    finalUrl += `&viewId=${shortViewId}`;
                } 
                // Otherwise fallback to the standard BCF viewpointId parameter which applies the camera view
                else if (firstVpId) {
                    finalUrl += `&viewpointId=${firstVpId}`;
                }

                // Append model IDs to force downloading the actual 3D files
                if (uniqueModels.length > 0) {
                    finalUrl += `&modelId=${uniqueModels.join(',')}`;
                }
                
                window.open(finalUrl, '_blank');

            } catch (err) {
                console.error("Kunne ikke hente viewpoint-detaljer:", err);
                // Fallback: Open standard topic link if fetch fails
                window.open(`https://web.connect.trimble.com/projects/${currentProjectId}/viewer/3d?topicId=${topicGuid}`, '_blank');
            } finally {
                // Restore link UI
                linkEl.innerHTML = originalHtml;
                linkEl.style.pointerEvents = "auto";
            }
        };

        function updateTable(data) {
            const tbody = document.getElementById('tableBody');
            document.getElementById('issueCount').textContent = data.length;
            tbody.innerHTML = ''; 

            if(data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" style="text-align:center; padding: 20px;">Ingen topics matcher filteret.</td></tr>';
                return;
            }

            data.forEach(issue => {
                const tr = document.createElement('tr');
                const tagsHtml = issue.tags.map(tag => `<span class="tag-badge">${escapeHtml(tag)}</span>`).join('');

                tr.innerHTML = `
                    <td>
                        <a href="#" onclick="openTopicIn3D(event, '${escapeHtml(issue.guid)}')" class="issue-link" title="Åpne i 3D Viewer (laster View og Modeller automatisk)">
                            ${escapeHtml(issue.id)}
                            <span class="link-icon">↗</span>
                        </a>
                    </td>
                    <td>${escapeHtml(issue.assignee)}</td>
                    <td><span class="badge" style="background-color: ${getColor(issue.status)}">${escapeHtml(issue.status)}</span></td>
                    <td><span class="badge" style="background-color: ${getColor(issue.priority)}">${escapeHtml(issue.priority)}</span></td>
                    <td>${tagsHtml}</td>
                `;
                tbody.appendChild(tr);
            });
        }

        window.onload = init;
    </script>
</body>
</html>
